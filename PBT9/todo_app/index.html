<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <h1>📝 Todo App</h1>

        <!-- Form thêm todo -->
        <form id="todoForm">
            <input id="todoInput" type="text" placeholder="Thêm việc cần làm..." autocomplete="off">
            <button type="submit">Thêm</button>
        </form>

        <!-- Filter buttons -->
        <div class="filters">
            <button class="filter-btn active" data-filter="all">Tất cả</button>
            <button class="filter-btn" data-filter="active">Chưa xong</button>
            <button class="filter-btn" data-filter="completed">Đã xong</button>
        </div>

        <!-- Danh sách todo -->
        <ul id="todoList"></ul>

        <!-- Footer: đếm + clear -->
        <div class="footer" id="todoFooter" style="display:none">
            <span id="itemCount">0 việc còn lại</span>
            <button id="clearCompleted">Xóa đã xong</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
