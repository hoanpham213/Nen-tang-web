<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Scroll Gallery</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',Arial,sans-serif; background:#111; color:#eee; }

        header {
            background:#1a1a2e; padding:14px 20px; text-align:center;
            font-size:20px; font-weight:bold; position:sticky; top:0; z-index:10;
            box-shadow:0 2px 8px rgba(0,0,0,0.4);
        }

        /* Grid responsive */
        .gallery-grid {
            display:grid;
            grid-template-columns:repeat(4, 1fr);
            gap:8px;
            padding:16px;
            max-width:1200px;
            margin:0 auto;
        }
        @media(max-width:900px) { .gallery-grid { grid-template-columns:repeat(2,1fr); } }
        @media(max-width:500px) { .gallery-grid { grid-template-columns:1fr; } }

        /* Photo item */
        .photo-item {
            position:relative; overflow:hidden;
            border-radius:8px; cursor:pointer;
            background:#222;
            aspect-ratio:4/3;
        }
        .photo-item img {
            width:100%; height:100%; object-fit:cover;
            transition:transform 0.3s, opacity 0.3s;
            opacity:0;
        }
        .photo-item img.loaded { opacity:1; }
        .photo-item:hover img { transform:scale(1.05); }

        .photo-overlay {
            position:absolute; inset:0;
            background:rgba(0,0,0,0); color:white;
            display:flex; align-items:flex-end; padding:10px;
            transition:background 0.2s;
        }
        .photo-item:hover .photo-overlay { background:rgba(0,0,0,0.35); }
        .photo-title { font-size:11px; opacity:0; transition:opacity 0.2s; }
        .photo-item:hover .photo-title { opacity:1; }

        /* Lazy load placeholder */
        .photo-placeholder {
            width:100%; height:100%; background:#333;
            display:flex; align-items:center; justify-content:center;
            font-size:24px; animation:pulse 1.5s ease infinite;
        }
        @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:0.8} }

        /* Load trigger + indicator */
        #loadTrigger { height:20px; }
        .load-indicator {
            text-align:center; padding:20px;
            color:#666; font-size:14px; display:none;
        }
        .load-indicator.show { display:block; }
        .load-dot {
            display:inline-block; width:8px; height:8px;
            background:#4a90e2; border-radius:50%;
            margin:0 3px; animation:bounce 0.8s ease infinite;
        }
        .load-dot:nth-child(2) { animation-delay:0.15s; }
        .load-dot:nth-child(3) { animation-delay:0.3s; }
        @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

        .end-msg {
            text-align:center; padding:24px;
            color:#555; font-size:14px; display:none;
        }

        /* Lightbox */
        .lightbox {
            display:none; position:fixed; inset:0;
            background:rgba(0,0,0,0.92); z-index:1000;
            align-items:center; justify-content:center;
            padding:16px;
        }
        .lightbox.show { display:flex; }
        .lightbox img {
            max-width:90vw; max-height:88vh;
            object-fit:contain; border-radius:8px;
            box-shadow:0 20px 60px rgba(0,0,0,0.5);
        }
        .lightbox-close {
            position:fixed; top:16px; right:20px;
            font-size:30px; cursor:pointer; color:white; z-index:1001;
            background:rgba(0,0,0,0.5); width:40px; height:40px;
            border-radius:50%; display:flex; align-items:center; justify-content:center;
        }
        .lightbox-title {
            position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
            color:white; font-size:14px; background:rgba(0,0,0,0.5);
            padding:6px 16px; border-radius:20px;
        }
    </style>
</head>
<body>

<header>🖼️ Infinite Scroll Gallery</header>

<div class="gallery-grid" id="galleryGrid"></div>

<div class="load-indicator" id="loadIndicator">
    <span class="load-dot"></span>
    <span class="load-dot"></span>
    <span class="load-dot"></span>
    <span style="margin-left:8px">Đang tải thêm ảnh...</span>
</div>

<div id="loadTrigger"></div>
<div class="end-msg" id="endMsg">✅ Đã hiển thị tất cả ảnh</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
    <div class="lightbox-close" id="lightboxClose">✕</div>
    <img src="" alt="" id="lightboxImg">
    <div class="lightbox-title" id="lightboxTitle"></div>
</div>

<script>
// ============================================================
// Infinite Scroll Gallery
// ============================================================
let currentPage = 0;
const LIMIT     = 20;
const MAX_PAGE  = 5;   // 5 trang × 20 = 100 ảnh
let isLoading   = false;

// ── Fetch ảnh từ Picsum ──
async function fetchPhotos(page) {
    const res = await fetch(`https://picsum.photos/v2/list?page=${page}&limit=${LIMIT}`);
    if (!res.ok) throw new Error("Lỗi tải ảnh");
    return res.json();
}

// ── Render ảnh ──
function renderPhotos(photos) {
    const grid = document.getElementById("galleryGrid");
    const fragment = document.createDocumentFragment();

    photos.forEach(photo => {
        const item = document.createElement("div");
        item.className = "photo-item";

        // Placeholder trước khi ảnh load
        const placeholder = document.createElement("div");
        placeholder.className = "photo-placeholder";
        placeholder.textContent = "🖼️";

        // Ảnh (lazy load bằng IntersectionObserver)
        const img = document.createElement("img");
        img.alt          = photo.author;
        img.dataset.src  = `https://picsum.photos/id/${photo.id}/400/300`;
        // Chưa set src → chưa load, chờ Observer

        img.addEventListener("load",  () => { img.classList.add("loaded"); placeholder.remove(); });
        img.addEventListener("error", () => { placeholder.textContent = "❌"; });

        const overlay = document.createElement("div");
        overlay.className = "photo-overlay";

        const title = document.createElement("span");
        title.className   = "photo-title";
        title.textContent = photo.author;
        overlay.appendChild(title);

        item.appendChild(placeholder);
        item.appendChild(img);
        item.appendChild(overlay);

        // Click → lightbox
        item.addEventListener("click", () => openLightbox(photo));

        // Observe ảnh để lazy load
        imageObserver.observe(img);

        fragment.appendChild(item);
    });

    grid.appendChild(fragment);
}

// ── IntersectionObserver cho lazy load ảnh ──
const imageObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            const img = entry.target;
            img.src = img.dataset.src;
            imageObserver.unobserve(img);   // Không cần observe nữa sau khi load
        }
    });
}, { rootMargin: "200px" });  // Load trước 200px khi ảnh sắp vào viewport

// ── Load more ──
async function loadMorePhotos() {
    if (isLoading || currentPage >= MAX_PAGE) return;
    isLoading = true;
    currentPage++;

    document.getElementById("loadIndicator").classList.add("show");

    try {
        const photos = await fetchPhotos(currentPage);
        renderPhotos(photos);

        if (currentPage >= MAX_PAGE) {
            document.getElementById("endMsg").style.display = "block";
            scrollObserver.disconnect();
        }
    } catch (err) {
        console.error("Lỗi:", err);
    } finally {
        isLoading = false;
        document.getElementById("loadIndicator").classList.remove("show");
    }
}

// ── IntersectionObserver cho infinite scroll ──
const scrollObserver = new IntersectionObserver((entries) => {
    if (entries[0].isIntersecting && !isLoading) {
        loadMorePhotos();
    }
}, { rootMargin: "300px" });  // Trigger trước 300px khi đến cuối

scrollObserver.observe(document.getElementById("loadTrigger"));

// ── Lightbox ──
function openLightbox(photo) {
    const img   = document.getElementById("lightboxImg");
    const title = document.getElementById("lightboxTitle");
    img.src          = `https://picsum.photos/id/${photo.id}/800/600`;
    img.alt          = photo.author;
    title.textContent = `📷 ${photo.author} — ${photo.width}×${photo.height}`;
    document.getElementById("lightbox").classList.add("show");
    document.body.style.overflow = "hidden";
}

function closeLightbox() {
    document.getElementById("lightbox").classList.remove("show");
    document.body.style.overflow = "";
}

document.getElementById("lightboxClose").addEventListener("click", closeLightbox);
document.getElementById("lightbox").addEventListener("click", (e) => {
    if (e.target === document.getElementById("lightbox")) closeLightbox();
});
document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closeLightbox();
});

// ── Init ──
loadMorePhotos();
</script>
</body>
</html>
