<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giới thiệu sản phẩm</title>
</head>
<body>
    <h1>Sản phẩm Multimedia</h1>
    <figure>
        <img src="product1.jpg" alt="Sản phẩm 1 - iphone 15">
        <figcaption>iPhone 15 Pro Max</figcaption>
    </figure>

    <figure>
        <img src="product2.jpg" alt="Sản phẩm 2 - iphone 16">
        <figcaption>iPhone 16 Pro Max</figcaption>
    </figure>

    <figure>
        <img src="product3.jpg" alt="Sản phẩm 3 - iphone 17">
        <figcaption>iPhone 17 Pro Max</figcaption>
    </figure>

    <h2>Video giới thiệu</h2>
    <iframe width="707" height="406" src="https://www.youtube.com/embed/keYat4iSYAQ" title="iPhone 15 Pro Reveal (4K)" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    
    <h2>Video sản phẩm</h2>
    <video controls poster="poster.jpg">
        <source src="demo.mp4" type="mp4">
        <source src="demo.webm" type="webm">
    </video>

    <h2>Nhạc nền</h2>
    <audio controls>
        <source src="music.mp3" type="mp3">
        <source src="music.ogg" type="ogg">
    </audio>

    <h2>Logo</h2>
    <svg width="100" height="100">
        <circle cx="50" cy="50" r="40" fill="black">
    </svg>

</body>
</html>
